[package]
name = "qubit-rayon-executor"
version = "0.2.0"
edition = "2024"
rust-version = "1.94"
authors = ["Haixing Hu <starfish.hu@gmail.com>"]
license = "Apache-2.0"
repository = "https://github.com/qubit-ltd/rs-rayon-executor"
description = "Rayon-backed CPU-bound executor service for Qubit Rust libraries"
homepage = "https://github.com/qubit-ltd/rs-rayon-executor"
documentation = "https://docs.rs/qubit-rayon-executor"
readme = "README.md"
keywords = ["rayon", "executor", "cpu", "concurrency"]
categories = ["concurrency"]
exclude = [
    "coverage.sh",
    "COVERAGE.md",
    "COVERAGE.zh_CN.md",
    ".circleci/*",
    "ci-check.sh",
    ".llvm-cov.toml",
    ".cargo-audit.toml.example",
]

[lib]
name = "qubit_rayon_executor"
doctest = true

[dependencies]
rayon = "1.12"
thiserror = "2.0"
tokio = { version = "1.52", features = ["sync"] }

qubit-atomic = "0.10"
qubit-executor = "0.2.1"
qubit-function = "0.13"

[dev-dependencies]
tokio = { version = "1.52", features = ["macros", "rt-multi-thread", "time"] }
